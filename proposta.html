<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Proposta Comercial | Meio Comunicacao e Consultoria</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0D1B2A;
      --navy-light: #1B2D45;
      --yellow: #F5C318;
      --yellow-soft: rgba(245,195,24,.12);
      --white: #FAFAFA;
      --gray-50: #f8f9fa;
      --gray-100: #e9ecef;
      --gray-400: #adb5bd;
      --gray-600: #495057;
      --gray-800: #212529;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--gray-50); color: var(--gray-800); line-height: 1.6; }

    /* ─── HEADER ──────────────────────────────────── */
    .hero {
      background: var(--navy);
      color: #fff;
      padding: 2.5rem 2rem 3rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(245,195,24,.08) 0%, transparent 60%),
                  radial-gradient(circle at 80% 50%, rgba(245,195,24,.05) 0%, transparent 60%);
    }
    .hero-inner { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 2rem; }
    .hero-logo { height: 120px; border-radius: 14px; flex-shrink: 0; }
    .hero-content { flex: 1; text-align: center; }
    .hero-tag {
      display: inline-block; background: var(--yellow-soft); color: var(--yellow);
      font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      padding: 6px 16px; border-radius: 100px; margin-bottom: 1rem;
    }
    .hero h1 { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: .5rem; }
    .hero h1 span { color: var(--yellow); }
    .hero-cliente { font-size: 1.1rem; color: rgba(255,255,255,.6); margin-bottom: 1.5rem; }
    .hero-meta {
      display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
      font-size: 13px; color: rgba(255,255,255,.45);
    }
    .hero-meta strong { color: var(--yellow); }

    /* ─── CONTAINER ───────────────────────────────── */
    .container { max-width: 820px; margin: 0 auto; padding: 0 1.5rem; }
    section { padding: 3.5rem 0; }
    .section-tag {
      display: inline-block; background: var(--yellow-soft); color: var(--navy);
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 100px; margin-bottom: .8rem;
    }
    .section-title { font-size: 1.5rem; font-weight: 800; color: var(--navy); margin-bottom: .5rem; }
    .section-sub { font-size: 15px; color: var(--gray-600); max-width: 600px; margin-bottom: 2rem; }
    .divider { border: none; border-top: 1px solid var(--gray-100); margin: 0; }

    /* ─── QUEM SOMOS ─────────────────────────────── */
    .about-text { font-size: 15px; color: var(--gray-600); line-height: 1.8; margin-bottom: 2rem; }
    .stats-row { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .stat {
      flex: 1; min-width: 140px; background: #fff; border: 1px solid var(--gray-100);
      border-radius: var(--radius); padding: 1.3rem; text-align: center;
    }
    .stat-num { font-size: 1.6rem; font-weight: 900; color: var(--navy); }
    .stat-label { font-size: 12px; color: var(--gray-600); margin-top: 4px; }

    /* ─── DIFERENCIAIS ───────────────────────────── */
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .diff-card {
      background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius);
      padding: 1.5rem; transition: border-color .3s;
    }
    .diff-card:hover { border-color: rgba(245,195,24,.4); }
    .diff-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--yellow-soft); color: var(--navy);
      font-size: 13px; font-weight: 800; margin-bottom: .8rem;
    }
    .diff-card h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: .4rem; }
    .diff-card p { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

    /* ─── METODO ──────────────────────────────────── */
    .timeline { display: flex; gap: 1rem; flex-wrap: wrap; }
    .timeline-step {
      flex: 1; min-width: 200px; background: #fff; border: 1px solid var(--gray-100);
      border-radius: var(--radius); padding: 1.5rem; position: relative;
    }
    .timeline-step::after {
      content: '→'; position: absolute; right: -14px; top: 50%;
      transform: translateY(-50%); color: var(--yellow); font-size: 20px; font-weight: 800;
    }
    .timeline-step:last-child::after { display: none; }
    .step-badge {
      display: inline-block; background: var(--navy); color: var(--yellow);
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px;
      margin-bottom: .8rem;
    }
    .timeline-step h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: .4rem; }
    .timeline-step p { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

    /* ─── SERVICOS & INVESTIMENTO ─────────────────── */
    .servico-card {
      background: #fff; border: 1px solid var(--gray-100); border-radius: var(--radius);
      padding: 2rem; margin-bottom: 1.2rem;
    }
    .servico-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .8rem; flex-wrap: wrap; gap: .5rem; }
    .servico-card h3 { font-size: 1.1rem; font-weight: 800; color: var(--navy); }
    .servico-valor {
      background: var(--yellow-soft); color: var(--navy); font-size: 1.1rem; font-weight: 800;
      padding: 6px 16px; border-radius: 10px; white-space: nowrap;
    }
    .servico-desc { font-size: 14px; color: var(--gray-600); margin-bottom: 1rem; }
    .servico-itens { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .servico-itens li {
      font-size: 13px; color: var(--gray-600); padding-left: 20px;
      position: relative;
    }
    .servico-itens li::before {
      content: ''; position: absolute; left: 0; top: 7px;
      width: 10px; height: 10px; border-radius: 3px; background: var(--yellow);
    }
    .total-bar {
      background: var(--navy); color: #fff; border-radius: var(--radius);
      padding: 1.5rem 2rem; display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 1rem; margin-top: 1.5rem;
    }
    .total-label { font-size: 15px; font-weight: 600; }
    .total-valor { font-size: 1.8rem; font-weight: 900; color: var(--yellow); }
    .total-nota { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 2px; }
    .total-nota s { color: rgba(255,255,255,.55); }
    .total-nota b { color: var(--yellow); font-weight: 700; }
    .servico-de { font-size: 13px; color: var(--gray-600); text-decoration: line-through; opacity: .7; margin-right: 4px; font-weight: 600; }
    .pagamento-box {
      margin-top: .8rem; border: 1px solid var(--gray-200, #e6e6e6); border-radius: var(--radius);
      padding: 1.1rem 1.4rem; background: #fbfbfd;
    }
    .pagamento-titulo { font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--navy); margin-bottom: .5rem; }
    .pagamento-linha { font-size: 15px; color: var(--navy); margin-top: 4px; }
    .pagamento-tag { font-size: 11px; font-weight: 700; color: #1c7c4a; background: #e7f6ec; padding: 2px 7px; border-radius: 999px; margin-left: 4px; }
    .pagamento-obs { font-size: 13px; color: var(--gray-600); margin-top: 6px; }

    /* ─── PROXIMOS PASSOS ─────────────────────────── */
    .passos-grid { display: flex; gap: 1.2rem; flex-wrap: wrap; }
    .passo {
      flex: 1; min-width: 200px; background: #fff; border: 1px solid var(--gray-100);
      border-radius: var(--radius); padding: 1.5rem; text-align: center;
    }
    .passo-quando {
      display: inline-block; background: var(--navy); color: var(--yellow);
      font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 6px;
      margin-bottom: .8rem;
    }
    .passo h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: .4rem; }
    .passo p { font-size: 13px; color: var(--gray-600); line-height: 1.5; }

    /* ─── CTA ──────────────────────────────────────── */
    .cta-section {
      background: var(--navy); color: #fff; text-align: center;
      padding: 3rem 2rem 2rem; border-radius: var(--radius) var(--radius) 0 0;
      margin-top: 2rem; position: relative;
    }
    .cta-section h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: .5rem; }
    .cta-section h2 span { color: var(--yellow); }
    .cta-section p { color: rgba(255,255,255,.6); font-size: 14px; margin-bottom: 1.5rem; }
    .cta-footer { display: flex; justify-content: space-between; align-items: center; max-width: 820px; margin: 2rem auto 0; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,.08); }
    .cta-footer-logo { height: 50px; border-radius: 8px; opacity: .7; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #25D366; color: #fff; text-decoration: none;
      font-size: 16px; font-weight: 700; padding: 14px 32px;
      border-radius: 12px; transition: opacity .2s;
    }
    .cta-btn:hover { opacity: .9; }
    .cta-btn svg { width: 22px; height: 22px; fill: #fff; }
    .cta-info { margin-top: 1.5rem; font-size: 13px; color: rgba(255,255,255,.4); }
    .cta-info a { color: var(--yellow); text-decoration: none; }

    .validade-badge {
      display: inline-block; background: rgba(255,68,68,.15); color: #ff4444;
      font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 100px;
      margin-top: 1rem;
    }

    /* ─── BOTAO PDF ──────────────────────────────── */
    .btn-pdf-wrap {
      max-width: 820px; margin: 1.5rem auto 0; padding: 0 1.5rem;
      display: flex; justify-content: flex-end;
    }
    .btn-baixar-pdf {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--navy); color: #fff; border: none;
      font-size: 13px; font-weight: 700; padding: 10px 20px;
      border-radius: 10px; cursor: pointer; text-decoration: none;
      transition: opacity .2s; font-family: inherit;
    }
    .btn-baixar-pdf:hover { opacity: .85; }
    .btn-baixar-pdf svg { width: 15px; height: 15px; fill: #fff; flex-shrink: 0; }

    /* ─── OBSERVACOES ────────────────────────────── */
    .obs-section {
      background: #fff; border: 1px solid var(--gray-100);
      border-radius: var(--radius); padding: 2rem; margin-bottom: 1.2rem;
    }
    .obs-section .obs-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--navy); background: var(--yellow-soft);
      display: inline-block; padding: 5px 14px; border-radius: 100px; margin-bottom: 1rem;
    }
    .obs-section .obs-body {
      font-size: 14px; color: var(--gray-600); line-height: 1.8;
    }
    .obs-section .obs-body ul,
    .obs-section .obs-body ol { padding-left: 1.4rem; margin: .4rem 0; }
    .obs-section .obs-body li { margin-bottom: .2rem; }
    .obs-section .obs-body p { margin-bottom: .5rem; }

    /* ─── PRINT ───────────────────────────────────── */
    @media print {
      @page { margin: 1.5cm; }
      body { background: #fff; }
      .btn-pdf-wrap { display: none !important; }
      .hero {
        background: var(--navy) !important;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .hero-tag, .step-badge, .section-tag, .diff-num, .passo-quando, .badge-versao,
      .servico-valor, .total-bar, .cta-section {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .total-bar {
        background: var(--navy) !important;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .cta-section {
        background: var(--navy) !important;
        border-radius: 0 !important;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .diff-card, .servico-card, .timeline-step, .passo, .stat, .obs-section {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .diff-grid { grid-template-columns: 1fr 1fr; }
      section { padding: 2rem 0; }
      .cta-btn { display: none !important; }
      .validade-badge { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      a { color: inherit; text-decoration: none; }
      .hero-meta strong { color: var(--yellow) !important; }
    }

    /* ─── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 640px) {
      .hero-inner { flex-direction: column; text-align: center; }
      .hero h1 { font-size: 1.5rem; }
      .cta-footer { flex-direction: column; gap: 1rem; text-align: center; }
      .cta-info { text-align: center !important; }
      .diff-grid { grid-template-columns: 1fr; }
      .timeline { flex-direction: column; }
      .timeline-step::after { display: none; }
      .servico-itens { grid-template-columns: 1fr; }
      .passos-grid { flex-direction: column; }
      .total-bar { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- Conteudo renderizado por JS -->
<div id="app"></div>

<script>
// ─── Sanitizer (espelho do admin — mesma whitelist) ────────────────────────────
const RTE_ALLOWED = {
  B: [], STRONG: [], I: [], EM: [], U: [],
  SPAN: ['style'],
  P: [], BR: [],
  UL: [], OL: [], LI: []
};
function sanitizeRichText(html) {
  if (!html || !html.trim()) return '';
  const doc = new DOMParser().parseFromString(html, 'text/html');
  function walkNode(node) {
    if (node.nodeType === Node.TEXT_NODE) return node.cloneNode(false);
    if (node.nodeType !== Node.ELEMENT_NODE) return null;
    const tag = node.tagName.toUpperCase();
    if (!(tag in RTE_ALLOWED)) {
      const frag = document.createDocumentFragment();
      node.childNodes.forEach(child => { const c = walkNode(child); if (c) frag.appendChild(c); });
      return frag;
    }
    const el = document.createElement(tag);
    (RTE_ALLOWED[tag] || []).forEach(attr => {
      if (node.hasAttribute(attr)) {
        if (attr === 'style') {
          const m = node.getAttribute('style').match(/color\s*:\s*[^;]+/i);
          if (m) el.setAttribute('style', m[0]);
        } else {
          el.setAttribute(attr, node.getAttribute(attr));
        }
      }
    });
    node.childNodes.forEach(child => { const c = walkNode(child); if (c) el.appendChild(c); });
    return el;
  }
  const result = document.createElement('div');
  doc.body.childNodes.forEach(child => { const c = walkNode(child); if (c) result.appendChild(c); });
  return result.innerHTML;
}

function getSlug() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('c')) return params.get('c');
  const path = window.location.pathname.replace(/\/$/, '').split('/');
  return path[path.length - 1] || 'exemplo';
}

function getVersion() {
  const params = new URLSearchParams(window.location.search);
  const v = parseInt(params.get('v') || '1', 10);
  return isNaN(v) || v < 1 ? 1 : v;
}

function getPropostaPath(slug, version) {
  if (version <= 1) return 'propostas/' + slug + '.json';
  return 'propostas/' + slug + '-v' + version + '.json';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatCurrency(val) {
  return 'R$ ' + val.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function calcValidade(dataStr, dias) {
  const d = new Date(dataStr + 'T12:00:00');
  d.setDate(d.getDate() + dias);
  return d.toLocaleDateString('pt-BR');
}

function render(data) {
  const validade = calcValidade(data.data, data.validade_dias);
  const dataProposta = new Date(data.data + 'T12:00:00').toLocaleDateString('pt-BR');

  document.title = 'Proposta — ' + esc(data.cliente) + ' | Meio Comunicacao';

  const totalMensal = data.servicos.filter(sv => (sv.tipo || 'mensal') === 'mensal').reduce((s, sv) => s + sv.valor, 0);
  const totalUnico = data.servicos.filter(sv => sv.tipo === 'unico').reduce((s, sv) => s + sv.valor, 0);

  // Ancoragem (empilhamento de valor): "valor avulso" por item, somado por cadência.
  const cheioOf = sv => (sv.valor_cheio != null && Number(sv.valor_cheio) > Number(sv.valor)) ? Number(sv.valor_cheio) : Number(sv.valor);
  const totalCheioMensal = data.servicos.filter(sv => (sv.tipo || 'mensal') === 'mensal').reduce((s, sv) => s + cheioOf(sv), 0);
  const totalCheioUnico = data.servicos.filter(sv => sv.tipo === 'unico').reduce((s, sv) => s + cheioOf(sv), 0);
  const pg = data.pagamento || null;

  // Próximos passos (editável; default corrigido — a proposta já foi enviada)
  const PASSOS_DEFAULT = [
    { quando: 'Quando você decidir', titulo: 'Aceite da proposta', descricao: 'Você aprova por aqui (ou responde no contato). Sem papelada — é rápido.' },
    { quando: 'Em até 3 dias', titulo: 'Reunião de alinhamento', descricao: 'Kickoff: alinhamos prioridades, prazos e coletamos os acessos necessários.' },
    { quando: 'Na sequência', titulo: 'Início dos trabalhos', descricao: 'Mãos à obra. Os primeiros entregáveis saem já nos primeiros dias.' }
  ];
  const passos = (Array.isArray(data.proximos_passos) && data.proximos_passos.length) ? data.proximos_passos : PASSOS_DEFAULT;
  const passosHTML = passos.map(p =>
    '<div class="passo">' +
      (p.quando ? '<div class="passo-quando">' + esc(p.quando) + '</div>' : '') +
      '<h3>' + esc(p.titulo || '') + '</h3>' +
      (p.descricao ? '<p>' + esc(p.descricao) + '</p>' : '') +
    '</div>').join('');

  const servicosHTML = data.servicos.map(sv => {
    const tipo = sv.tipo || 'mensal';
    const sufixo = tipo === 'mensal' ? '/mês' : ' (único)';
    const temAncora = sv.valor_cheio != null && Number(sv.valor_cheio) > Number(sv.valor);
    return '<div class="servico-card">' +
      '<div class="servico-header">' +
        '<h3>' + esc(sv.nome) + '</h3>' +
        '<div class="servico-valor">' +
          (temAncora ? '<span class="servico-de">' + formatCurrency(Number(sv.valor_cheio)) + '</span> ' : '') +
          formatCurrency(sv.valor) + sufixo +
        '</div>' +
      '</div>' +
      '<p class="servico-desc">' + esc(sv.descricao) + '</p>' +
      '<ul class="servico-itens">' +
        sv.itens.map(it => '<li>' + esc(it) + '</li>').join('') +
      '</ul>' +
    '</div>';
  }).join('');

  // Botao PDF — injetado antes do app, fora do flow de impressao
  const pdfWrap = document.createElement('div');
  pdfWrap.className = 'btn-pdf-wrap';
  pdfWrap.innerHTML =
    '<button class="btn-baixar-pdf" onclick="window.print()">' +
      '<svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>' +
      'Baixar PDF' +
    '</button>';
  document.getElementById('app').parentNode.insertBefore(pdfWrap, document.getElementById('app'));

  // Secao de observacoes (so renderiza se tiver conteudo)
  const obsHTML = (function() {
    const sanitized = sanitizeRichText(data.observacoes || '');
    if (!sanitized.trim()) return '';
    return '<hr class="divider">' +
      '<section>' +
        '<div class="obs-section">' +
          '<div class="obs-label">Observacoes</div>' +
          '<div class="obs-body">' + sanitized + '</div>' +
        '</div>' +
      '</section>';
  })();

  document.getElementById('app').innerHTML =
    /* HEADER */
    '<div class="hero">' +
      '<div class="hero-inner">' +
        '<img src="customcolor_logo_customcolor_background.png" alt="Meio Comunicacao" class="hero-logo">' +
        '<div class="hero-content">' +
          '<div class="hero-tag">Proposta Comercial</div>' +
          '<h1>Proposta para <span>' + esc(data.cliente) + '</span></h1>' +
          '<p class="hero-cliente">Preparada para ' + esc(data.contato || data.cliente) + '</p>' +
          '<div class="hero-meta">' +
            '<span>Data: <strong>' + dataProposta + '</strong></span>' +
            '<span>Validade: <strong>' + validade + '</strong></span>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="container">' +

    /* QUEM SOMOS */
    '<section>' +
      '<div class="section-tag">Quem Somos</div>' +
      '<h2 class="section-title">Estratégia, criatividade e execução.</h2>' +
      '<p class="about-text">A Meio Comunicação é uma agência de marketing digital focada em resultados reais para PMEs. Desenvolvemos estratégias personalizadas e entregamos a execução completa — da campanha ao criativo, do copy ao relatório — tudo feito internamente com total controle de qualidade.</p>' +
      '<div class="stats-row">' +
        '<div class="stat"><div class="stat-num">+30</div><div class="stat-label">Clientes atendidos</div></div>' +
        '<div class="stat"><div class="stat-num">360&deg;</div><div class="stat-label">Execucao integrada</div></div>' +
