<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Depoimentos | Meio Comunicação</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root { --navy: #0D1B2A; --yellow: #F5C318; --gray-100: #e9ecef; --gray-600: #495057; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f4f5f7; min-height: 100vh; }

    .header { background: var(--navy); color: #fff; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .header img { height: 40px; border-radius: 8px; }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .header span { color: var(--yellow); font-size: .85rem; }

    .container { max-width: 750px; margin: 2rem auto; padding: 0 1.5rem; }

    .card { background: #fff; border: 1px solid var(--gray-100); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.2rem; position: relative; }
    .card label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; margin-top: 12px; }
    .card label:first-child { margin-top: 0; }
    .card input, .card textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .card textarea { resize: vertical; min-height: 70px; }
    .card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .card .card-num { font-weight: 700; color: var(--navy); font-size: 15px; }

    .stars-row { display: flex; gap: 4px; margin-top: 6px; }
    .stars-row button { background: none; border: none; font-size: 22px; cursor: pointer; color: #ddd; transition: color .15s; }
    .stars-row button.active { color: var(--yellow); }

    .foto-row { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
    .foto-preview { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gray-100); }

    .btn-remove { background: #ff4444; color: #fff; border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-remove:hover { background: #cc0000; }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 1.5rem 0; }
    .btn { border: none; border-radius: 10px; padding: 12px 24px; cursor: pointer; font-size: 14px; font-weight: 700; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn-add { background: var(--navy); color: #fff; }
    .btn-save { background: var(--yellow); color: var(--navy); }
    .btn-download { background: #27ae60; color: #fff; }

    .preview-section { background: var(--navy); border-radius: 14px; padding: 2rem; margin-top: 2rem; }
    .preview-section h2 { color: #fff; font-size: 1.1rem; margin-bottom: 1.2rem; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; }
    .preview-card { background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.09); border-radius: 14px; padding: 1.5rem; }
    .preview-stars { color: var(--yellow); font-size: 15px; letter-spacing: 2px; margin-bottom: .8rem; }
    .preview-text { font-size: 14px; color: rgba(255,255,255,.78); line-height: 1.7; font-style: italic; margin-bottom: 1.2rem; }
    .preview-author { display: flex; align-items: center; gap: 10px; }
    .preview-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--yellow); color: var(--navy); font-weight: 800; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .preview-name { font-weight: 700; font-size: 13px; color: #fff; }
    .preview-role { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }

    .msg { background: #d4edda; color: #155724; padding: 12px 16px; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <img src="customcolor_logo_customcolor_background.png" alt="Meio Comunicação">
  <div>
    <h1>Gerenciador de Depoimentos</h1>
    <span>Edite, adicione ou remova depoimentos do site</span>
  </div>
</div>

<div class="container">
  <div class="msg" id="msg"></div>
  <div id="lista"></div>

  <div class="actions">
    <button class="btn btn-add" onclick="adicionar()">+ Novo depoimento</button>
    <button class="btn btn-save" onclick="salvar()">Salvar depoimentos.json</button>
  </div>

  <div class="preview-section">
    <h2>Preview (como aparece no site)</h2>
    <div class="preview-grid" id="preview"></div>
  </div>
</div>

<script>
let dados = [];

function carregar() {
  fetch('depoimentos.json?v=' + Date.now())
    .then(r => r.json())
    .then(d => { dados = d; render(); renderPreview(); })
    .catch(() => { dados = []; render(); });
}

function render() {
  const el = document.getElementById('lista');
  el.innerHTML = '';
  dados.forEach((d, i) => {
    const fotoPreview = d.foto ? '<img class="foto-preview" src="' + d.foto + '" alt="foto">' : '';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-header">' +
        '<span class="card-num">Depoimento #' + (i + 1) + '</span>' +
        '<button class="btn-remove" onclick="remover(' + i + ')">Remover</button>' +
      '</div>' +
      '<label>Nome</label>' +
      '<input type="text" value="' + esc(d.nome) + '" oninput="dados[' + i + '].nome=this.value; renderPreview()">' +
      '<label>Cargo / Empresa</label>' +
      '<input type="text" value="' + esc(d.cargo) + '" oninput="dados[' + i + '].cargo=this.value; renderPreview()">' +
      '<label>Depoimento</label>' +
      '<textarea oninput="dados[' + i + '].texto=this.value; renderPreview()">' + esc(d.texto) + '</textarea>' +
      '<label>URL da Foto</label>' +
      '<div class="foto-row">' +
        '<input type="text" value="' + esc(d.foto) + '" oninput="dados[' + i + '].foto=this.value; atualizarFoto(this); renderPreview()" placeholder="Cole o link direto da imagem">' +
        fotoPreview +
      '</div>' +
      '<label>Estrelas</label>' +
      '<div class="stars-row">' +
        [1,2,3,4,5].map(n =>
          '<button class="' + (n <= (d.estrelas||5) ? 'active' : '') + '" onclick="setEstrelas(' + i + ',' + n + ')">&#9733;</button>'
        ).join('') +
      '</div>';
    el.appendChild(card);
  });
}

function renderPreview() {
  const el = document.getElementById('preview');
  el.innerHTML = '';
  dados.forEach(d => {
    const estrelas = '\u2605'.repeat(d.estrelas || 5) + '\u2606'.repeat(5 - (d.estrelas || 5));
    const avatarContent = d.foto
      ? '<img src="' + d.foto + '" alt="' + esc(d.nome) + '">'
      : (d.nome ? d.nome.charAt(0).toUpperCase() : '?');
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.innerHTML =
      '<div class="preview-stars">' + estrelas + '</div>' +
      '<p class="preview-text">"' + esc(d.texto) + '"</p>' +
      '<div class="preview-author">' +
        '<div class="preview-avatar">' + avatarContent + '</div>' +
        '<div><div class="preview-name">' + esc(d.nome) + '</div>' +
        '<div class="preview-role">' + esc(d.cargo) + '</div></div>' +
      '</div>';
    el.appendChild(card);
  });
}

function atualizarFoto(input) {
  const row = input.closest('.foto-row');
  const old = row.querySelector('.foto-preview');
  if (old) old.remove();
  if (input.value) {
    const img = document.createElement('img');
    img.className = 'foto-preview';
    img.src = input.value;
    img.alt = 'foto';
    row.appendChild(img);
  }
}

function setEstrelas(idx, n) {
  dados[idx].estrelas = n;
  render();
  renderPreview();
}

function adicionar() {
  dados.push({ nome: '', cargo: '', texto: '', estrelas: 5, foto: '' });
  render();
  renderPreview();
  window.scrollTo({ top: document.getElementById('lista').scrollHeight, behavior: 'smooth' });
}

function remover(idx) {
  if (confirm('Remover depoimento #' + (idx + 1) + '?')) {
    dados.splice(idx, 1);
    render();
    renderPreview();
  }
}

function salvar() {
  const blob = new Blob([JSON.stringify(dados, null, 2) + '\n'], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'depoimentos.json';
  a.click();
  URL.revokeObjectURL(a.href);
  mostrarMsg('depoimentos.json baixado! Substitua o arquivo na pasta do site e faça deploy.');
}

function mostrarMsg(texto) {
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

carregar();
</script>
</body>
</html>
